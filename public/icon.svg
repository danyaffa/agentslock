<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red circle background -->
  <circle cx="256" cy="256" r="256" fill="#D32F2F"/>

  <!-- Stop hand — geometric shapes combined -->
  <g fill="#FFFFFF">
    <!-- Index finger -->
    <rect x="178" y="128" width="38" height="170" rx="19"/>
    <!-- Middle finger (tallest) -->
    <rect x="226" y="104" width="38" height="194" rx="19"/>
    <!-- Ring finger -->
    <rect x="274" y="128" width="38" height="170" rx="19"/>
    <!-- Pinky finger -->
    <rect x="322" y="160" width="34" height="138" rx="17"/>
    <!-- Palm -->
    <rect x="152" y="256" width="218" height="104" rx="28"/>
    <!-- Wrist -->
    <rect x="210" y="342" width="100" height="62" rx="16"/>
    <!-- Thumb (angled to the left) -->
    <rect x="98" y="196" width="34" height="100" rx="17" transform="rotate(30 115 246)"/>
    <!-- Thumb-palm connector -->
    <rect x="132" y="232" width="52" height="52" rx="16"/>
  </g>
</svg>
