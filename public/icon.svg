<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red circle background -->
  <circle cx="256" cy="256" r="248" fill="#D32F2F"/>

  <g fill="#FFFFFF">
    <!-- Index finger -->
    <rect x="182" y="124" width="40" height="158" rx="20"/>
    <!-- Middle finger (tallest) -->
    <rect x="234" y="100" width="40" height="182" rx="20"/>
    <!-- Ring finger -->
    <rect x="286" y="124" width="40" height="158" rx="20"/>
    <!-- Pinky finger -->
    <rect x="336" y="158" width="36" height="124" rx="18"/>
    <!-- Palm -->
    <rect x="148" y="258" width="230" height="96" rx="24"/>
    <!-- Wrist -->
    <rect x="213" y="340" width="96" height="62" rx="16"/>
    <!-- Thumb -->
    <rect x="100" y="186" width="36" height="100" rx="18" transform="rotate(30 118 236)"/>
    <!-- Thumb-palm bridge -->
    <ellipse cx="162" cy="266" rx="30" ry="26"/>
  </g>

  <!-- Finger separations (red lines to create gaps between fingers) -->
  <g stroke="#D32F2F" stroke-width="6" stroke-linecap="round">
    <line x1="222" y1="268" x2="222" y2="178"/>
    <line x1="274" y1="268" x2="274" y2="178"/>
    <line x1="326" y1="268" x2="326" y2="204"/>
  </g>
</svg>
